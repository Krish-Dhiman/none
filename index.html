<!DOCTYPE html>
<html>
<head>
<title>For You ❤️</title>

<style>

body{
background:black;
color:white;
text-align:center;
font-family:Arial;
overflow:hidden;
}

button{
padding:15px 30px;
font-size:20px;
margin:20px;
border:none;
border-radius:10px;
cursor:pointer;
}

#yes{
background:red;
color:white;
}

#no{
background:gray;
color:white;
position:absolute;
}

.slideshow{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

.slide{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
display:none;
}

#main{
display:none;
margin-top:50px;
}

</style>

</head>

<body>

<div id="start">

<h1>I made something special for you ❤️</h1>

<button onclick="start()">Click to open</button>

</div>

<div id="main">

<h1 id="typing"></h1>

<div class="slideshow">

<img class="slide" src="one.jpg">
<img class="slide" src="two.jpg">
<img class="slide" src="three.jpg">
<img class="slide" src="four.jpg">

</div>

<br>

<audio id="music" controls loop>
<source src="song.mp3" type="audio/mpeg">
</audio>

<br><br>

<h2>Will you be mine? ❤️</h2>

<button id="yes" onclick="yes()">Yes ❤️</button>
<button id="no" onmouseover="move()">No 😅</button>

</div>

<script>

/* start screen */


function start(){
    document.getElementById("music").play();
document.getElementById("start").style.display="none";
document.getElementById("main").style.display="block";

type();
showSlides();

}

/* typing message */

const text="I don't know what the future holds... but I know I want you in it ❤️";

let i=0;

function type(){

if(i<text.length){

document.getElementById("typing").innerHTML+=text.charAt(i);

i++;

setTimeout(type,80);

}

}


/* slideshow */

let index=0;

function showSlides(){

let slides=document.getElementsByClassName("slide");

for(let i=0;i<slides.length;i++){
slides[i].style.display="none";
}

index++;

if(index>slides.length){
index=1;
}

slides[index-1].style.display="block";

setTimeout(showSlides,2000);

}

/* moving no button */

function move(){

const x=Math.random()*window.innerWidth;
const y=Math.random()*window.innerHeight;

const btn=document.getElementById("no");

btn.style.left=x+"px";
btn.style.top=y+"px";

}

/* yes button */

function yes(){

document.body.innerHTML = `
<h1 style="color:pink;margin-top:200px;">
Thankyou so much for taking interest in this mini work.YOU are the most beautiful person in the world ❤️
</h1>
<h2>Lets start a beautiful journey together 💕</h2>
`;

/* hearts rain */

setInterval(()=>{

const heart=document.createElement("div");

heart.innerHTML="❤️";

heart.style.position="fixed";
heart.style.left=Math.random()*100+"vw";
heart.style.top="-10px";
heart.style.fontSize="30px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},4000);

},200);

}

</script>

</body>
</html>
