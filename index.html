<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Navratri ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle, #1a0000, black);
  color: white;
  text-align: center;
  overflow: hidden;
}

/* START SCREEN */
#start {
  margin-top: 150px;
}

h1 {
  color: gold;
  text-shadow: 0 0 20px orange, 0 0 40px red;
}

/* BUTTONS */
button {
  padding: 12px 25px;
  font-size: 18px;
  border: none;
  border-radius: 25px;
  cursor: pointer;
}

#yes {
  background: orange;
  color: white;
}

#no {
  background: gray;
  color: white;
  position: absolute;
}

/* MAIN */
#main {
  display: none;
}

/* SLIDESHOW FULL SCREEN */
.slideshow {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
}

.slideshow img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: none;
  animation: zoom 6s ease-in-out infinite;
}

/* ZOOM EFFECT */
@keyframes zoom {
  0% { transform: scale(1); }
  100% { transform: scale(1.1); }
}

/* DIYA */
.diya {
  position: fixed;
  bottom: 0;
  font-size: 30px;
  animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-100vh); opacity: 0; }
}

/* HEART */
.heart {
  position: fixed;
  top: -10px;
  font-size: 20px;
  animation: fall 5s linear infinite;
}

@keyframes fall {
  to { transform: translateY(100vh); }
}

/* ENTER BUTTON ANIMATION */
#start button {
  background: orange;
  color: white;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}

</style>
</head>

<body>

<!-- MUSIC -->
<audio id="music" src="song.mp3" loop></audio>

<!-- START -->
<div id="start">
  <h1>🌸 Happy Navratri 🌸</h1>
  <h2>Maa Durga Bless You ❤️</h2>
  <button onclick="start()">Enter 💫</button>
</div>

<!-- MAIN -->
<div id="main">

  <div class="slideshow">
    <img src="1.jpg">
    <img src="2.jpg">
    <img src="3.jpg">
    <img src="4.jpg">
  </div>

  <h1 id="text"></h1>

  <h2>Will you be mine? ❤️</h2>

  <button id="yes" onclick="yesClick()">Yes 😍</button>
  <button id="no" onmouseover="moveNo()">No 😜</button>

</div>

<script>

/* START */
function start() {
  document.getElementById("start").style.display = "none";
  document.getElementById("main").style.display = "block";
  document.getElementById("music").play();

  typeText();
  showSlides();
  diya();
}

/* TYPING */
const message = "🌺 i love you so much meri nikki .i love you forever happy navratri meri nikki ❤️";
let i = 0;

function typeText() {
  if (i < message.length) {
    document.getElementById("text").innerHTML += message.charAt(i);
    i++;
    setTimeout(typeText, 50);
  }
}

/* SLIDESHOW */
let slideIndex = 0;
function showSlides() {
  let slides = document.querySelectorAll(".slideshow img");
  slides.forEach(img => img.style.display = "none");

  slideIndex++;
  if (slideIndex > slides.length) slideIndex = 1;

  slides[slideIndex - 1].style.display = "block";
  setTimeout(showSlides, 3000);
}

/* NO BUTTON */
function moveNo() {
  let x = Math.random() * (window.innerWidth - 100);
  let y = Math.random() * (window.innerHeight - 50);

  document.getElementById("no").style.left = x + "px";
  document.getElementById("no").style.top = y + "px";
}

/* YES CLICK */
function yesClick() {
  document.body.innerHTML = `
    <h1 style="margin-top:200px; color:pink;">
      💖 Yesss! 💖 <br> Happy Navratri My Love 💃🕺
    </h1>
  `;
  hearts();
  fireworks();
}

/* DIYA */
function diya() {
  setInterval(() => {
    let d = document.createElement("div");
    d.innerHTML = "🪔";
    d.className = "diya";
    d.style.left = Math.random() * 100 + "vw";

    document.body.appendChild(d);
    setTimeout(() => d.remove(), 6000);
  }, 500);
}

/* HEARTS */
function hearts() {
  setInterval(() => {
    let h = document.createElement("div");
    h.innerHTML = "❤️";
    h.className = "heart";
    h.style.left = Math.random() * 100 + "vw";

    document.body.appendChild(h);
    setTimeout(() => h.remove(), 5000);
  }, 200);
}

/* FIREWORKS */
function fireworks() {
  setInterval(() => {
    let f = document.createElement("div");
    f.innerHTML = "✨";
    f.style.position = "fixed";
    f.style.left = Math.random() * 100 + "vw";
    f.style.top = Math.random() * 100 + "vh";
    f.style.fontSize = "30px";

    document.body.appendChild(f);
    setTimeout(() => f.remove(), 1000);
  }, 200);
}

</script>

</body>
</html>
